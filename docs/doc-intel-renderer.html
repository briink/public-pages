<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Document Intelligence Viewer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #c9d1d9; background: #0d1117; padding: 12px 14px; font-size: 13px; line-height: 1.4; }

        .file-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #21262d; }
        .file-header h2 { font-size: 14px; font-weight: 600; color: #e6edf3; }
        .file-id { font-size: 11px; color: #7d8590; font-family: ui-monospace, 'SF Mono', monospace; }

        .section { margin-bottom: 10px; }
        .section-label { font-size: 11px; font-weight: 500; color: #7d8590; margin-bottom: 4px; }

        .tags { columns: 280px; column-gap: 8px; }
        .tag { display: block; break-inside: avoid; padding: 4px 10px; margin-bottom: 3px; border-radius: 4px; font-size: 13px; background: rgba(56, 139, 253, 0.08); color: #79c0ff; border-left: 2px solid #388bfd; }

        .stats-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .stat { display: flex; align-items: baseline; gap: 4px; }
        .stat-val { font-size: 13px; font-weight: 600; color: #e6edf3; }
        .stat-lbl { font-size: 11px; color: #7d8590; }

        .text-block { background: #161b22; border: 1px solid #21262d; border-radius: 4px; padding: 8px 10px; font-size: 12px; line-height: 1.5; color: #8b949e; white-space: pre-wrap; }

        .links-row { display: flex; flex-wrap: wrap; gap: 6px; }
        .link-pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 4px; font-size: 11px; background: #161b22; border: 1px solid #21262d; color: #58a6ff; text-decoration: none; }
        .link-pill:hover { background: #1c2129; border-color: #388bfd40; }

        .images-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; }
        .chunk-img { height: 120px; border: 1px solid #21262d; border-radius: 4px; flex-shrink: 0; }
        .chunk-img:hover { border-color: #388bfd; }

        .kv-grid { display: grid; grid-template-columns: auto 1fr; gap: 2px 10px; font-size: 12px; }
        .kv-key { color: #7d8590; white-space: nowrap; }
        .kv-val { color: #c9d1d9; word-break: break-all; }

        .disclosure-group { margin-bottom: 16px; }
        .disclosure-group-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1px solid #21262d; }
        .framework-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; background: rgba(56, 139, 253, 0.15); color: #79c0ff; text-transform: uppercase; letter-spacing: 0.04em; }
        .group-meta { font-size: 11px; color: #7d8590; }
        .group-count { font-size: 11px; color: #7d8590; margin-left: auto; }

        .disclosure-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .disclosure-table th { text-align: left; font-weight: 500; color: #7d8590; padding: 6px 8px; border-bottom: 1px solid #21262d; font-size: 11px; text-transform: uppercase; letter-spacing: 0.03em; }
        .disclosure-table td { padding: 6px 8px; border-bottom: 1px solid #21262d; vertical-align: top; line-height: 1.45; }
        .disclosure-table tr:last-child td { border-bottom: none; }
        .disclosure-table tbody tr:hover td { background: #161b22; }
        .col-id { font-family: ui-monospace, 'SF Mono', monospace; color: #79c0ff; white-space: nowrap; font-weight: 500; }
        .col-desc { color: #c9d1d9; min-width: 200px; }
        .col-pages { white-space: nowrap; }
        .col-val { color: #e6edf3; font-weight: 500; }
        .col-notes { color: #8b949e; font-size: 11px; font-style: italic; max-width: 320px; }
        .page-pill { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 11px; background: #161b22; border: 1px solid #21262d; color: #58a6ff; font-family: ui-monospace, 'SF Mono', monospace; margin-right: 3px; }
        .empty-cell { color: #484f58; }

        .hidden { display: none; }
        #loading { color: #484f58; font-size: 12px; }
    </style>
</head>
<body>
    <div id="loading">Waiting for data...</div>
    <div id="content" class="hidden"></div>

    <script>
        window.addEventListener("message", (event) => {
            const { type, data, metadata } = event.data || {};
            if (!data) return;
            const inputs = (metadata && metadata.inputs) || {};
            document.getElementById("loading").classList.add("hidden");
            const c = document.getElementById("content");
            c.classList.remove("hidden");
            c.innerHTML = render(data, inputs, type);
        });

        function render(data, inputs, type) {
            const groups = getDisclosureGroups(data);
            if (groups) return renderDisclosureTable(groups, inputs, data);

            const fileId = inputs.file_id || data.file_id || "";
            const fileName = inputs.file_name || data.file_name || "";
            const wsId = inputs.workspace_id || data.workspace_id || "";
            const tags = data.content_tags || [];
            const summary = data.summary || "";
            const chunks = data.total_chunks;
            const tokens = data.total_token_size;
            const avg = data.avg_tokens_per_chunk;
            const imgPath = data.chunk_images_path || "";
            const mime = data.mime_type || "";
            const analysis = data.analysis || null;
            const custom = data.custom || null;

            let h = "";

            // Header
            if (fileName || fileId) {
                h += `<div class="file-header">
                    <h2>${esc(fileName || fileId)}</h2>
                    ${fileName && fileId ? `<span class="file-id">${esc(fileId)}</span>` : ""}
                </div>`;
            }

            // Tags
            if (tags.length) {
                h += `<div class="section">
                    <div class="tags">${tags.map(t => `<span class="tag">${esc(t)}</span>`).join("")}</div>
                </div>`;
            }

            // Stats inline
            const s = [];
            if (chunks != null) s.push([chunks, "chunks"]);
            if (tokens != null) s.push([tokens.toLocaleString(), "tokens"]);
            if (avg != null) s.push([Math.round(avg), "avg/chunk"]);
            if (mime) s.push([mime.split("/").pop(), "type"]);
            if (s.length) {
                h += `<div class="section"><div class="stats-row">${s.map(([v,l]) =>
                    `<div class="stat"><span class="stat-val">${v}</span><span class="stat-lbl">${esc(l)}</span></div>`
                ).join("")}</div></div>`;
            }

            // Links as pills
            const links = [];
            const platformUrl = data.platform_url || (wsId && fileId ? `https://platform.briink.com/${wsId}/documents/${fileId}` : "");
            if (platformUrl) links.push(["Platform", platformUrl]);
            if (inputs.gcs_path) links.push(["GCS", inputs.gcs_path]);
            if (imgPath) links.push(["Images", imgPath]);
            if (links.length) {
                h += `<div class="section"><div class="links-row">${links.map(([l,u]) =>
                    `<a class="link-pill" href="${ea(u)}" target="_blank" rel="noopener">${esc(l)}</a>`
                ).join("")}</div></div>`;
            }

            // Summary
            if (summary) {
                h += `<div class="section"><div class="section-label">Summary</div><div class="text-block">${esc(summary)}</div></div>`;
            }

            // Chunk images horizontal scroll
            if (data.chunk_image_urls && data.chunk_image_urls.length) {
                h += `<div class="section"><div class="section-label">Chunks (${data.chunk_image_urls.length})</div>
                    <div class="images-row">${data.chunk_image_urls.map((u,i) =>
                        `<img class="chunk-img" src="${ea(u)}" alt="${i}" loading="lazy" />`
                    ).join("")}</div></div>`;
            }

            // Analysis
            if (analysis) {
                h += `<div class="section"><div class="section-label">Analysis</div><div class="text-block">${esc(typeof analysis === "string" ? analysis : JSON.stringify(analysis, null, 2))}</div></div>`;
            }

            // Custom fields as compact grid
            if (custom && typeof custom === "object") {
                const entries = Object.entries(custom);
                if (entries.length) {
                    h += `<div class="section"><div class="section-label">Fields</div><div class="kv-grid">${entries.map(([k,v]) =>
                        `<span class="kv-key">${esc(k)}</span><span class="kv-val">${esc(String(v))}</span>`
                    ).join("")}</div></div>`;
                }
            }

            return h;
        }

        function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
        function ea(s) { return s.replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/'/g,"&#39;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

        function looksLikeDisclosureGroup(o) {
            if (!o || typeof o !== "object") return false;
            if (!("framework" in o)) return false;
            for (const k of ["disclosures", "items", "entries", "rows"]) {
                if (Array.isArray(o[k])) return true;
            }
            return false;
        }

        function getDisclosureGroups(data) {
            if (!data) return null;
            if (Array.isArray(data) && data.length && looksLikeDisclosureGroup(data[0])) return data;
            if (typeof data !== "object") return null;
            for (const v of Object.values(data)) {
                if (Array.isArray(v) && v.length && looksLikeDisclosureGroup(v[0])) return v;
            }
            return null;
        }

        function getDisclosureItems(group) {
            for (const k of ["disclosures", "items", "entries", "rows"]) {
                if (Array.isArray(group[k])) return group[k];
            }
            return [];
        }

        function formatPages(pages) {
            if (!Array.isArray(pages) || !pages.length) return '<span class="empty-cell">—</span>';
            return pages.map(p => `<span class="page-pill">${esc(String(p))}</span>`).join("");
        }

        function renderDisclosureTable(groups, inputs, data) {
            const fileId = inputs.file_id || (data && data.file_id) || "";
            const fileName = inputs.file_name || (data && data.file_name) || "";

            let h = "";
            if (fileName || fileId) {
                h += `<div class="file-header">
                    <h2>${esc(fileName || fileId)}</h2>
                    ${fileName && fileId ? `<span class="file-id">${esc(fileId)}</span>` : ""}
                </div>`;
            }

            for (const group of groups) {
                const framework = group.framework || "";
                const startPage = group.page;
                const items = getDisclosureItems(group);

                const hasValue = items.some(d => d.value != null && d.value !== "");
                const hasNotes = items.some(d => d.notes);
                const hasPages = items.some(d => Array.isArray(d.pages) && d.pages.length);

                h += `<div class="disclosure-group">
                    <div class="disclosure-group-header">
                        ${framework ? `<span class="framework-badge">${esc(framework)}</span>` : ""}
                        ${startPage != null ? `<span class="group-meta">starts p. ${esc(String(startPage))}</span>` : ""}
                        <span class="group-count">${items.length} ${items.length === 1 ? "disclosure" : "disclosures"}</span>
                    </div>
                    <table class="disclosure-table">
                        <thead><tr>
                            <th class="col-id">ID</th>
                            <th class="col-desc">Description</th>
                            ${hasPages ? '<th class="col-pages">Pages</th>' : ""}
                            ${hasValue ? '<th class="col-val">Value</th>' : ""}
                            ${hasNotes ? '<th class="col-notes">Notes</th>' : ""}
                        </tr></thead>
                        <tbody>${items.map(d => `<tr>
                            <td class="col-id">${esc(d.disclosure_id || "")}</td>
                            <td class="col-desc">${esc(d.description || "")}</td>
                            ${hasPages ? `<td class="col-pages">${formatPages(d.pages)}</td>` : ""}
                            ${hasValue ? `<td class="col-val">${d.value != null && d.value !== "" ? esc(String(d.value)) : '<span class="empty-cell">—</span>'}</td>` : ""}
                            ${hasNotes ? `<td class="col-notes">${d.notes ? esc(d.notes) : '<span class="empty-cell">—</span>'}</td>` : ""}
                        </tr>`).join("")}</tbody>
                    </table>
                </div>`;
            }
            return h;
        }
    </script>
</body>
</html>
